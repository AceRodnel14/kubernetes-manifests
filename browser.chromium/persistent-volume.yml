# Persistent Volumes and Claims
apiVersion: v1
kind: PersistentVolume
metadata:
  name: chromium-config-pv
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: nfs.smb.com
    path: /mnt/ssd/hdd/chromium
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chromium-config-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  volumeName: chromium-config-pv