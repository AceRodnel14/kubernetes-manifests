apiVersion: v1
kind: PersistentVolume
metadata:
 name: prometheus-data-pv
spec:
 capacity:
   storage: 20Gi
 accessModes:
   - ReadWriteOnce
 persistentVolumeReclaimPolicy: Retain
 nfs:
   server: nfs.smb.com
   path: /mnt/ssd/hdd/prometheus
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
 name: prometheus-data-pvc
 namespace: monitoring
spec:
 accessModes:
   - ReadWriteOnce
 resources:
   requests:
     storage: 20Gi
 volumeName: prometheus-data-pv