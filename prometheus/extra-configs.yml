apiVersion: v1
kind: Secret
metadata:
  name: additional-configs
  namespace: monitoring
type: Opaque
stringData:
  extra-configs.yml: |
    - job_name: 'blackbox_isp1'
      metrics_path: /probe
      params:
        module: [http_2xx]
      static_configs:
        - targets:
            - https://google.com
            - https://github.com
            - https://cloudflare.com
      relabel_configs:
        - source_labels: [__address__]
          target_label: __param_target
        - source_labels: [__param_target]
          target_label: instance
        - target_label: __address__
          replacement: 192.192.188.3:9115

    - job_name: 'blackbox_isp2'
      metrics_path: /probe
      params:
        module: [http_2xx]
      static_configs:
        - targets:
            - https://google.com
            - https://github.com
            - https://cloudflare.com
      relabel_configs:
        - source_labels: [__address__]
          target_label: __param_target
        - source_labels: [__param_target]
          target_label: instance
        - target_label: __address__
          replacement: 192.192.188.4:9115

    - job_name: 'public_ip_isp1'
      metrics_path: /public_ip.prom
      static_configs:
        - targets: ['192.192.188.3:9116']

    - job_name: 'public_ip_isp2'
      metrics_path: /public_ip.prom
      static_configs:
        - targets: ['192.192.188.4:9116']

    - job_name: 'speedtest_isp1'
      metrics_path: /speedtest.prom
      static_configs:
        - targets: ['192.192.188.3:9117']

    - job_name: 'speedtest_isp2'
      metrics_path: /speedtest.prom
      static_configs:
        - targets: ['192.192.188.4:9117']