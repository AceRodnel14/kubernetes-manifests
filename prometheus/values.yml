grafana:
  enabled: false

prometheus:
  prometheusSpec:
    retention: 15d
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1
        memory: 2Gi
    storageSpec: {}
    volumes:
      - name: prometheus-storage
        persistentVolumeClaim:
          claimName: prometheus-data-pvc

alertmanager:
  enabled: true

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true