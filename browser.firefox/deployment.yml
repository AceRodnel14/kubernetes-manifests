# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firefox
spec:
  replicas: 0
  selector:
    matchLabels:
      app: firefox
  template:
    metadata:
      labels:
        app: firefox
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: firefox
          image: linuxserver/firefox:1148.0.2
          ports:
            - containerPort: 3000
          env:
            - name: PUID
              value: '1000'
            - name: PGID
              value: '1000'
            - name: TZ
              value: Asia/Manila
            - name: FIREFOX_CLI
              value: http://pc.xyz.abc/
          volumeMounts:
            - name: config-volume
              mountPath: /config
              readOnly: false
      volumes:
        - name: config-volume
          persistentVolumeClaim:
            claimName: firefox-config-pvc